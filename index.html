<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yaute Rápidas Pro v10.71</title>
    
    <!-- Librerías de confianza -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card-radius: 14px;
        }

        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg); }
        body { display: flex; flex-direction: column; font-family: 'Inter', sans-serif; color: #1e293b; }
        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 95px; }

        /* --- SPLASH SCREEN --- */
        #splash-screen { 
            position: fixed; inset: 0; background: #ffffff; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .splash-logo { width: 120px; height: auto; margin-bottom: 20px; animation: pulse 2s infinite ease-in-out; }
        .splash-loader { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        #splash-status { margin-top: 15px; font-size: 0.7rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; text-align: center; max-width: 80%; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- UI --- */
        header { background: var(--primary); color: white; padding: 0.7rem 1rem; position: sticky; top: 0; z-index: 1000; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; text-align: center; }
        .card-custom { background: white; border-radius: var(--card-radius); padding: 15px; margin-bottom: 12px; border-left: 5px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        
        #toast-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 12000; padding: 12px 24px; border-radius: 50px; font-weight: 700; display: none; color: white; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: all 0.3s; font-size: 0.8rem; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-control { padding: 0.65rem 0.8rem; font-size: 0.9rem; border-radius: 10px; border: 1.5px solid #e2e8f0; }
        label.text-uppercase { font-size: 0.6rem; margin-bottom: 4px; font-weight: 800; color: #64748b; display: block; }

        .btn-inline-cam { background: #eff6ff; color: var(--accent); border: 1.5px solid #dbeafe; border-radius: 10px; width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #ffffff; display: flex; justify-content: space-around; padding: 10px 0 25px; border-top: 1px solid #e2e8f0; z-index: 2000; }
        .tab-btn { background: none; border: none; color: #94a3b8; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .tab-btn i { font-size: 1.4rem; margin-bottom: 4px; }
        .tab-btn.active { color: var(--accent); font-weight: 800; }

        .sub-nav { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0 15px; scrollbar-width: none; }
        .sub-btn { background: white; border: 1px solid #e2e8f0; border-radius: 15px; padding: 6px 14px; font-size: 0.7rem; white-space: nowrap; color: #64748b; font-weight: 600; }
        .sub-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .sug-box { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 10px; max-height: 180px; overflow-y: auto; z-index: 1500; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        .sug-item { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; font-weight: 600; }

        #cam-container { position: fixed; inset: 0; background: #000; z-index: 10010; display: none; }
        #cam-preview { width: 100%; height: 100%; object-fit: cover; }
        .cam-controls { position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: center; }
        .btn-capture { width: 70px; height: 70px; background: #fff; border: 6px solid rgba(255,255,255,0.3); border-radius: 50%; }

        #ticket-render { position: absolute; top: -10000px; width: 380px; background: white; padding: 30px; color: black; font-family: 'Courier New', Courier, monospace; }
        .ticket-header-img { width: 160px; display: block; margin: 0 auto 10px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="logo.png" alt="Yaute Logo" class="splash-logo" onerror="this.src='https://via.placeholder.com/120?text=Yaute'">
        <div class="splash-loader"></div>
        <div id="splash-status">AUTENTICANDO...</div>
    </div>

    <!-- Script de Desbloqueo Inmediato -->
    <script>
        window.removeSplash = function() {
            const splash = document.getElementById('splash-screen');
            if (splash) {
                splash.style.opacity = '0';
                setTimeout(function() { splash.style.display = 'none'; }, 500);
            }
        };
        // Paracaídas de emergencia: 3 segundos
        setTimeout(window.removeSplash, 3000);
    </script>

    <div id="toast-alert"></div>

    <header>
        <div class="d-flex align-items-center justify-content-center gap-2">
            <h6 class="m-0 fw-bold text-uppercase">Yaute Rápidas Pro</h6>
            <div id="status-dot" class="bg-warning" style="width:10px; height:10px; border-radius:50%; transition: background 0.3s; box-shadow: 0 0 5px rgba(0,0,0,0.1);"></div>
        </div>
    </header>

    <div id="cam-container">
        <video id="cam-preview" autoplay playsinline muted></video>
        <button id="btn-cam-cancel" style="position:absolute; top:40px; right:20px; background:rgba(0,0,0,0.5); color:white; border:none; border-radius:50%; width:44px; height:44px;"><i class="fas fa-times"></i></button>
        <div class="cam-controls"><button id="btn-do-capture" class="btn-capture"></button></div>
        <canvas id="cam-canvas" style="display:none;"></canvas>
    </div>

    <main>
        <!-- VENTA -->
        <div id="tab-operaciones" class="tab-content active">
            <div class="card-custom" style="border-left-color: var(--accent);">
                <div class="row g-2 mb-3">
                    <div class="col-6" style="position:relative">
                        <label class="text-uppercase">Tienda</label>
                        <input type="text" id="in-tienda" class="form-control text-uppercase fw-bold text-primary" placeholder="WALMART">
                        <div id="sug-tienda" class="sug-box d-none"></div>
                    </div>
                    <div class="col-6" style="position:relative">
                        <label class="text-uppercase">Cliente</label>
                        <input type="text" id="in-cliente" class="form-control text-uppercase" placeholder="NOMBRE">
                        <div id="sug-cliente" class="sug-box d-none"></div>
                    </div>
                </div>
                <hr class="my-3 opacity-10">
                <div class="row g-2 mb-3 align-items-end">
                    <div class="col-3">
                        <label class="text-uppercase">Cant.</label>
                        <input type="number" id="in-cantidad" class="form-control text-center fw-bold" value="1">
                    </div>
                    <div class="col" style="position:relative">
                        <label class="text-uppercase">Producto</label>
                        <input type="text" id="in-producto" class="form-control text-uppercase" placeholder="Escanear...">
                        <div id="sug-producto" class="sug-box d-none"></div>
                    </div>
                    <div class="col-auto">
                        <button id="btn-scan" class="btn-inline-cam"><i class="fas fa-camera"></i></button>
                    </div>
                </div>
                <div class="row g-2 mb-4">
                    <div class="col-6">
                        <label class="text-uppercase">Costo Anaquel</label>
                        <input type="number" id="in-costo" class="form-control text-danger fw-bold" placeholder="0.00" step="0.01">
                    </div>
                    <div class="col-6">
                        <label class="text-uppercase">Precio Venta</label>
                        <input type="number" id="in-precio" class="form-control text-success fw-bold" placeholder="0.00" step="0.01">
                    </div>
                </div>
                <button id="btn-save" class="btn btn-primary w-100 py-3 fw-bold rounded-3">GUARDAR VENTA</button>
            </div>
        </div>

        <!-- REPARTO -->
        <div id="tab-entregas" class="tab-content">
            <div class="card-custom py-2 mb-3 text-center">
                <label class="text-uppercase small fw-bold">Fecha de Reparto</label>
                <input type="date" id="entregas-date" class="form-control text-center fw-bold border-0" onchange="window.renderEntregas()">
            </div>
            <div id="lista-entregas"></div>
        </div>

        <!-- CONTROL -->
        <div id="tab-control" class="tab-content">
            <div class="sub-nav">
                <button class="sub-btn active" id="btn-sub-clients" onclick="window.switchSubTab('clientes', this)">Clientes</button>
                <button class="sub-btn" id="btn-sub-products" onclick="window.switchSubTab('productos', this)">Productos</button>
                <button class="sub-btn" id="btn-sub-sales" onclick="window.switchSubTab('sales', this)">Ventas</button>
                <button class="sub-btn" id="btn-sub-diezmo" onclick="window.switchSubTab('diezmo', this)">Diezmo</button>
            </div>
            <div id="filter-wrapper" class="mb-3"></div>
            <div id="lista-catalogos"></div>
        </div>
    </main>

    <div id="ticket-render" style="position: absolute; top: -10000px; width: 380px; background: white; padding: 30px; color: black; font-family: 'Courier New', Courier, monospace;">
        <div style="text-align: center; font-size: 1.3rem; font-weight: 900; margin-bottom: 5px;">YAUTE RÁPIDAS</div>
        <div id="t-date-val" style="text-align: center; font-size: 1rem; margin-bottom: 15px;"></div>
        <div style="border-top: 3px solid #000; margin: 10px 0;"></div>
        <div style="margin: 15px 0;"><b>CLIENTE:</b> <span id="t-cliente-name" style="text-transform: uppercase;"></span></div>
        <table style="width: 100%; border-collapse: collapse;"><tbody id="t-body-items"></tbody></table>
        <div style="border-top: 2px dashed #000; margin: 15px 0;"></div>
        <div style="font-size: 1.5rem; font-weight: 900; display: flex; justify-content: space-between;"><span>TOTAL:</span><span id="t-grand-total"></span></div>
    </div>

    <nav class="bottom-nav">
        <button class="tab-btn active" onclick="window.showTab('operaciones', this)"><i class="fas fa-cash-register"></i>Venta</button>
        <button class="tab-btn" onclick="window.showTab('entregas', this)"><i class="fas fa-truck"></i>Reparto</button>
        <button class="tab-btn" onclick="window.showTab('control', this)"><i class="fas fa-history"></i>Control</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, updateDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURACIÓN DINÁMICA FIREBASE
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'yaute-v1-shared';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let state = { sales: [], clients: [], stores: [], products: [] };
        let activeSubTab = 'clientes';
        let user = null;

        const setIndicatorStatus = (status) => {
            const dot = document.getElementById('status-dot');
            if (!dot) return;
            if (status === 'connected') {
                dot.classList.remove('bg-warning', 'bg-danger');
                dot.classList.add('bg-success');
                dot.style.boxShadow = '0 0 10px rgba(16, 185, 129, 0.5)';
            } else if (status === 'error') {
                dot.classList.remove('bg-warning', 'bg-success');
                dot.classList.add('bg-danger');
                dot.style.boxShadow = '0 0 10px rgba(239, 68, 68, 0.5)';
            }
        };

        const updateStatusText = (msg) => {
            const el = document.getElementById('splash-status');
            if(el) el.innerText = msg;
        };

        // --- INICIO DE CONEXIÓN (REGLA 3) ---
        const startApp = async () => {
            try {
                updateStatusText("CONECTANDO A LA NUBE...");
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth mismatch, trying fallback...");
                await signInAnonymously(auth).catch(e => {
                    updateStatusText("ERROR DE PERMISOS. RECARGUE.");
                    setIndicatorStatus('error');
                });
            }
        };

        startApp();

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                updateStatusText("CARGANDO DATOS...");
                window.removeSplash(); // Quitar splash inmediatamente tras autenticación
                
                document.getElementById('entregas-date').value = new Intl.DateTimeFormat('en-CA').format(new Date());
                startSync();
                window.switchSubTab('clientes', document.getElementById('btn-sub-clients'));
            }
        });

        const startSync = () => {
            if (!user) return;
            
            const colNames = ['sales', 'clients', 'stores', 'products'];
            let firstLoad = true;

            colNames.forEach(n => {
                // REGLA 1: Rutas estrictas obligatorias
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', n), (s) => {
                    state[n] = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    
                    // Si recibimos cualquier dato, el botón pasa a VERDE
                    if (firstLoad) {
                        setIndicatorStatus('connected');
                        firstLoad = false;
                    }
                    
                    if(n === 'sales') window.renderEntregas();
                    window.renderCatalogList();
                }, (err) => {
                    console.error("Firebase Sync Error:", n, err);
                    if(err.code === 'permission-denied') setIndicatorStatus('error');
                });
            });

            setupAuto('in-tienda', 'sug-tienda', 'stores'); 
            setupAuto('in-cliente', 'sug-cliente', 'clients'); 
            setupAuto('in-producto', 'sug-producto', 'products');
        };

        const setupAuto = (id, boxId, key) => {
            const inp = document.getElementById(id); const box = document.getElementById(boxId);
            if (!inp || !box) return;
            inp.oninput = () => {
                const val = inp.value.toUpperCase();
                if(!val) { box.classList.add('d-none'); return; }
                const ms = (state[key] || []).filter(x => {
                    const name = (x.nombre || x.name || x.productName || '').toUpperCase();
                    return name.includes(val);
                }).slice(0, 5);
                box.innerHTML = ms.map(x => `<div class="sug-item" data-val="${x.nombre || x.name || x.productName}">${x.nombre || x.name || x.productName}</div>`).join('');
                box.classList.toggle('d-none', ms.length === 0);
            };
            box.onclick = (e) => {
                const item = e.target.closest('.sug-item'); if(!item) return;
                inp.value = item.dataset.val; box.classList.add('d-none');
                if (key === 'products') {
                    const prod = state.products.find(p => (p.nombre || p.name || p.productName) === item.dataset.val);
                    if (prod) { 
                        document.getElementById('in-costo').value = prod.pCosto || prod.costo || ""; 
                        document.getElementById('in-precio').value = prod.pVenta || prod.precio || ""; 
                    }
                }
            };
        };

        // --- NAVEGACIÓN ---
        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            const tab = document.getElementById(`tab-${id}`);
            if (tab) tab.classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
        };

        window.switchSubTab = (id, btn) => {
            activeSubTab = id;
            document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            
            const fw = document.getElementById('filter-wrapper');
            if(!fw) return;
            
            const today = new Intl.DateTimeFormat('en-CA').format(new Date());
            if(id === 'clientes' || id === 'productos') {
                fw.innerHTML = `<input type="text" id="search-cat" class="form-control" placeholder="Buscar..." oninput="window.renderCatalogList()">`;
            } else if(id === 'sales') {
                fw.innerHTML = `<input type="date" id="hist-date" class="form-control" value="${today}" onchange="window.renderCatalogList()">`;
            } else if(id === 'diezmo') {
                fw.innerHTML = `<div class="d-flex gap-2"><input type="date" id="d-start" class="form-control" value="${today}" onchange="window.renderCatalogList()"><input type="date" id="d-end" class="form-control" value="${today}" onchange="window.renderCatalogList()"></div>`;
            } else { fw.innerHTML = ''; }
            window.renderCatalogList();
        };

        window.renderEntregas = () => {
            const list = document.getElementById('lista-entregas'); if(!list) return;
            const selInput = document.getElementById('entregas-date')?.value;
            if(!selInput) return;
            const targetDate = new Date(selInput + "T12:00:00").toLocaleDateString('es-MX');
            const filtered = state.sales.filter(s => s.fechaStr === targetDate);
            if(!filtered.length) { list.innerHTML = '<p class="text-center py-5 opacity-30">Sin pedidos registrados hoy</p>'; return; }
            const grouped = filtered.reduce((acc, v) => { const c = v.cliente || "S/N"; if(!acc[c]) acc[c] = {t:0, items:[]}; acc[c].t += v.total; acc[c].items.push(v); return acc; }, {});
            list.innerHTML = Object.keys(grouped).map(cli => `
                <div class="card-custom">
                    <div class="d-flex justify-content-between mb-2"><b class="text-uppercase">${cli}</b><button class="btn btn-sm btn-success rounded-pill px-3 shadow-sm" onclick="window.shareTicket('${cli}')"><i class="fab fa-whatsapp"></i></button></div>
                    <div class="check-group mb-2"><label class="check-item"><input type="checkbox" ${grouped[cli].items.every(i => i.entregado) ? 'checked' : ''} onchange="window.toggleClientStatus('${cli}', '${targetDate}', 'entregado', this.checked)"> ENTREGA</label><label class="check-item"><input type="checkbox" ${grouped[cli].items.every(i => i.pagado) ? 'checked' : ''} onchange="window.toggleClientStatus('${cli}', '${targetDate}', 'pagado', this.checked)"> PAGO</label></div>
                    <div class="small opacity-75">${grouped[cli].items.map(i => `<div>⚡ ${i.cantidad}x ${i.producto}</div>`).join('')}</div>
                    <div class="text-end fw-bold text-primary mt-2 border-top pt-1">$${grouped[cli].t.toFixed(2)}</div></div>`).join('');
        };

        window.toggleClientStatus = async (clientName, targetDate, field, val) => {
            if(!user) return;
            const items = state.sales.filter(s => s.cliente === clientName && s.fechaStr === targetDate);
            for (const item of items) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sales', item.id), { [field]: val }); }
        };

        window.renderCatalogList = () => {
            const list = document.getElementById('lista-catalogos'); if(!list) return;
            const q = document.getElementById('search-cat')?.value.toUpperCase() || "";
            
            if(activeSubTab === 'clientes') {
                const filtered = state.clients.filter(c => (c.nombre || c.name || '').toUpperCase().includes(q));
                list.innerHTML = filtered.sort((a,b)=>(a.nombre || a.name || '').localeCompare(b.nombre || b.name || '')).map(c => `
                    <div class="card-custom d-flex justify-content-between align-items-center py-2 mb-1">
                        <b>${c.nombre || c.name}</b>
                        <button class="btn btn-sm text-danger" onclick="window.deleteItem('clients','${c.id}')"><i class="fas fa-trash-alt"></i></button>
                    </div>`).join('');
            } else if(activeSubTab === 'productos') {
                const filtered = state.products.filter(p => (p.nombre || p.name || p.productName || '').toUpperCase().includes(q));
                list.innerHTML = filtered.sort((a,b)=>(a.nombre || a.name || '').localeCompare(b.nombre || b.name || '')).map(p => `
                    <div class="card-custom py-2">
                        <b>${p.nombre || p.name || p.productName}</b><br>
                        <small class="opacity-50">Costo: $${(p.pCosto||p.costo||0).toFixed(2)} | Venta: $${(p.pVenta||p.precio||0).toFixed(2)}</small>
                    </div>`).join('');
            } else if(activeSubTab === 'sales') {
                const dateEl = document.getElementById('hist-date'); if(!dateEl) return;
                const fd = new Date(dateEl.value + "T12:00:00").toLocaleDateString('es-MX');
                const dv = state.sales.filter(s => s.fechaStr === fd);
                list.innerHTML = dv.map(v => `<div class="card-custom py-2 d-flex justify-content-between"><div>${v.producto}<br><small>${v.cliente}</small></div><b>$${v.total.toFixed(2)}</b></div>`).join('') + `<div class="card-custom bg-primary text-white">TOTAL DÍA: $${dv.reduce((a,v)=>a+v.total,0).toFixed(2)}</div>`;
            } else if(activeSubTab === 'diezmo') {
                const sEl = document.getElementById('d-start'); const eEl = document.getElementById('d-end');
                if(!sEl || !eEl) return;
                const s = new Date(sEl.value + "T00:00:00");
                const e = new Date(eEl.value + "T23:59:59");
                const fs = state.sales.filter(v => { const d = v.fecha ? v.fecha.toDate() : new Date(); return d >= s && d <= e; });
                const profit = fs.reduce((a,v)=> a + (v.total - ((v.costo || v.pCosto || 0) * v.cantidad)), 0);
                list.innerHTML = `<div class="card-custom bg-primary text-white text-center py-4"><h3>$${(profit * 0.1).toFixed(2)}</h3><div class="small opacity-80">Diezmo acumulado (10% de ganancia)</div></div>`;
            }
        };

        window.deleteItem = async (col, id) => { if(confirm("¿Eliminar del catálogo?")) { if(!user) return; await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id)); } };

        document.getElementById('btn-save').onclick = async () => {
            if(!user) return;
            const data = {
                tienda: document.getElementById('in-tienda').value.trim().toUpperCase(),
                cliente: document.getElementById('in-cliente').value.trim().toUpperCase(),
                producto: document.getElementById('in-producto').value.trim().toUpperCase(),
                cantidad: parseInt(document.getElementById('in-cantidad').value) || 1,
                costo: parseFloat(document.getElementById('in-costo').value) || 0,
                precio: parseFloat(document.getElementById('in-precio').value) || 0,
                fechaStr: new Date().toLocaleDateString('es-MX'),
                total: (parseInt(document.getElementById('in-cantidad').value) || 1) * (parseFloat(document.getElementById('in-precio').value) || 0),
                entregado: false, pagado: false
            };
            if(!data.tienda || !data.producto || !data.cliente) return showToast("Faltan datos", "danger");
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'sales'), { ...data, fecha: serverTimestamp() });
                const ck = async (col, val, ext = {}) => { 
                    if(!state[col].some(x => (x.nombre || x.name || '').toUpperCase() === val)) {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', col), { nombre: val, ...ext }); 
                    }
                };
                await ck('stores', data.tienda); await ck('clients', data.cliente); await ck('products', data.producto, { pCosto: data.costo, pVenta: data.precio });
                showToast("¡Venta guardada!");
                document.getElementById('in-producto').value = ""; document.getElementById('in-costo').value = ""; document.getElementById('in-precio').value = "";
            } catch(e) { showToast("Error al guardar", "danger"); }
        };

        // --- CÁMARA & IA ---
        const btnScan = document.getElementById('btn-scan');
        const camContainer = document.getElementById('cam-container');
        const camPreview = document.getElementById('cam-preview');
        const camCanvas = document.getElementById('cam-canvas');
        let stream = null;

        btnScan.onclick = async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 } } });
                camPreview.srcObject = stream;
                camContainer.style.display = 'block';
            } catch (e) { showToast("Cámara no disponible", "danger"); }
        };

        document.getElementById('btn-cam-cancel').onclick = () => { 
            if(stream) stream.getTracks().forEach(t => t.stop()); 
            camContainer.style.display = 'none'; 
        };

        document.getElementById('btn-do-capture').onclick = () => {
            const ctx = camCanvas.getContext('2d');
            camCanvas.width = camPreview.videoWidth; camCanvas.height = camPreview.videoHeight;
            ctx.drawImage(camPreview, 0, 0);
            const base64 = camCanvas.toDataURL('image/jpeg', 0.8).split(',')[1];
            if(stream) stream.getTracks().forEach(t => t.stop());
            camContainer.style.display = 'none';
            processProductIA(base64);
        };

        async function processProductIA(base64) {
            showToast("Analizando...");
            const apiKey = ""; 
            try {
                const payload = {
                    contents: [{ parts: [{ text: "Extrae nombre del producto comercial y costo (solo número). Responde JSON: {'nombre': string, 'costo': number}" }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }],
                    generationConfig: { responseMimeType: "application/json" }
                };
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                const data = await res.json();
                const result = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text.replace(/```json|```/g, "").trim() || "{}");
                if(result.nombre) {
                    document.getElementById('in-producto').value = result.nombre.toUpperCase();
                    if(result.costo) document.getElementById('in-costo').value = result.costo;
                    showToast("¡Análisis completado!");
                }
            } catch (e) { showToast("Error IA", "danger"); }
        }
    </script>
</body>
</html>
